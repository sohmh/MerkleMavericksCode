<!DOCTYPE html>
<html>
<head>
  <title>Escrow DApp</title>
</head>
<body>

<h2>Escrow System</h2>
<label>Select Network:</label>
<select id="networkSelect">
  <option value="eth">Ethereum (Sepolia)</option>
  <option value="algo">Algorand (Demo Integration)</option>
</select>

<button onclick="connectWallet()">Connect Wallet</button>

<p id="role-badge">Role: Not connected</p>
<p id="balance">Escrow holds: — ETH</p>
<p id="status">Status: Not Connected</p>
<p id="txLink"></p>

<br>
<button onclick="deposit()"         id="depositBtn"  style="display:none">Deposit 0.01 ETH</button>
<button onclick="confirmDelivery()" id="confirmBtn"  style="display:none">Confirm Delivery</button>
<button onclick="refund()"          id="refundBtn"   style="display:none">Issue Refund (Arbiter)</button>

<ul id="txLog"></ul>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
 <script src="https://unpkg.com/algosdk@2.7.0/dist/browser/algosdk.min.js"></script>
 <script src="https://unpkg.com/@perawallet/connect@1.3.5/dist/umd/index.js"></script>
<script src="script.js"></script>

</body>
</html>
