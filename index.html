<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Algorand Escrow dApp</title>
</head>
<body>
  <h1>Algorand Escrow</h1>

  <p><strong>Network:</strong> Algorand TestNet</p>
  <p><strong>App ID:</strong> <span id="appIdValue"></span></p>
  <p><strong>Connected Address:</strong> <span id="address">Not connected</span></p>
  <p id="status">Status: Ready</p>
  <p id="txId"></p>

  <button id="connectBtn">Connect Wallet</button>
  <button id="depositBtn">Deposit</button>
  <button id="confirmBtn">Confirm Delivery</button>
  <button id="refundBtn">Refund</button>

  <script src="https://unpkg.com/algosdk/dist/browser/algosdk.min.js"></script>
  <script src="https://unpkg.com/@perawallet/connect/dist/index.umd.js"></script>
  <script src="script.js"></script>
</body>
</html>
